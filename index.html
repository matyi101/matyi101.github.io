<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CDMP Fundamentals Practice Exam</title>
    <style>
        body { font-family: Arial, sans-serif; line-height: 1.6; max-width: 800px; margin: auto; padding: 20px; background-color: #f4f4f4; }
        .card { background: white; padding: 20px; border-radius: 8px; box-shadow: 0 2px 5px rgba(0,0,0,0.1); margin-bottom: 20px; }
        .question { font-weight: bold; font-size: 1.2em; margin-bottom: 15px; }
        .option { display: block; margin: 10px 0; padding: 10px; border: 1px solid #ddd; border-radius: 4px; cursor: pointer; }
        .option:hover { background-color: #e9e9e9; }
        .correct { background-color: #d4edda !important; border-color: #c3e6cb; }
        .incorrect { background-color: #f8d7da !important; border-color: #f5c6cb; }
        .explanation { display: none; margin-top: 15px; padding: 15px; background: #e2f3ff; border-left: 5px solid #007bff; }
        #results { font-size: 1.5em; text-align: center; font-weight: bold; }
        button { padding: 10px 20px; background: #007bff; color: white; border: none; border-radius: 4px; cursor: pointer; }
    </style>
</head>
<body>

    <h1>CDMP Fundamentals Exam (DMBoK v2)</h1>
    <div id="quiz-container"></div>
    <div id="results"></div>

    <script>
        const questions = [
            {
                q: "Which of the following is the primary goal of Data Governance?",
                options: ["To manage data as a valuable asset", "To install a central metadata repository", "To eliminate all data silos", "To automate data cleaning"],
                correct: 0,
                ref: "DMBoK2, Page 67",
                why: "Data Governance is defined as the exercise of authority and control over the management of data assets (Henderson et al., 2017)."
            },
            {
                q: "The DAMA-DMBOK2 Wheel consists of how many Knowledge Areas?",
                options: ["9", "10", "11", "12"],
                correct: 2,
                ref: "DMBoK2, Page 35",
                why: "The DAMA Wheel includes 11 Knowledge Areas: Governance, Architecture, Modeling, Storage, Security, Integration, Documents, Reference/Master Data, Warehousing/BI, Metadata, and Quality."
            },
            {
                q: "In the Context Diagram format, which element describes the 'Rules' and 'Standards'?",
                options: ["Activities", "Inputs", "Drivers", "Deliverables"],
                correct: 2,
                ref: "DMBoK2, Page 38",
                why: "Drivers include goals, principles, and standards that guide the Knowledge Area (Henderson et al., 2017)."
            },
            {
                q: "Which role is primarily responsible for the business-side 'meaning' and 'quality' of data?",
                options: ["Data Architect", "Data Steward", "Database Administrator", "Data Scientist"],
                correct: 1,
                ref: "DMBoK2, Page 73",
                why: "Data Stewards act as the bridge between IT and business, ensuring data quality and alignment with business needs."
            },
            {
                q: "ACID properties (Atomicity, Consistency, Isolation, Durability) are primarily associated with:",
                options: ["Data Warehousing", "Relational Database Transactions", "Data Mining", "NoSQL Document Stores"],
                correct: 1,
                ref: "DMBoK2, Page 174",
                why: "ACID is a set of properties of database transactions intended to guarantee data validity despite errors or power failures."
            },
            {
                q: "Which data modeling level is independent of technology and focuses on business definitions?",
                options: ["Physical Data Model", "Logical Data Model", "Conceptual Data Model", "Canonical Data Model"],
                correct: 2,
                ref: "DMBoK2, Page 129",
                why: "Conceptual models represent high-level business concepts and their relationships, independent of any implementation details."
            },
            {
                q: "What is the central Knowledge Area of the DAMA Wheel?",
                options: ["Data Quality", "Data Governance", "Metadata Management", "Data Architecture"],
                correct: 1,
                ref: "DMBoK2, Page 35",
                why: "Data Governance is at the center because it provides the oversight and authority for all other knowledge areas."
            },
            {
                q: "In Master Data Management (MDM), which architecture uses a central hub for data updates that are then pushed to subscribers?",
                options: ["Registry", "Consolidated", "Transactional / Hub-and-Spoke", "Coexistence"],
                correct: 2,
                ref: "DMBoK2, Page 360",
                why: "A Transactional hub acts as the system of record where data is mastered and synchronized across the enterprise."
            },
            {
                q: "Which dimension of Data Quality refers to the degree to which data represents the reality it describes?",
                options: ["Timeliness", "Accuracy", "Completeness", "Consistency"],
                correct: 1,
                ref: "DMBoK2, Page 458",
                why: "Accuracy is defined as the degree to which data correctly describes the 'real world' object or event being described."
            },
            {
                q: "Data Life Cycle Management focuses on data from:",
                options: ["Creation to Disposal", "Storage to Retrieval", "Input to Output", "Ingestion to Dashboard"],
                correct: 0,
                ref: "DMBoK2, Page 28",
                why: "Data Management must cover the entire lifecycle from planning and creation to archiving and destruction."
            }
        ];

        let currentScore = 0;

        function renderQuiz() {
            const container = document.getElementById('quiz-container');
            questions.forEach((item, index) => {
                const div = document.createElement('div');
                div.className = 'card';
                div.innerHTML = `
                    <div class="question">${index + 1}. ${item.q}</div>
                    <div id="options-${index}">
                        ${item.options.map((opt, i) => `<div class="option" onclick="checkAnswer(${index}, ${i})">${opt}</div>`).join('')}
                    </div>
                    <div id="exp-${index}" class="explanation">
                        <strong>Answer: ${item.options[item.correct]}</strong><br>
                        <em>${item.ref}</em><br><br>
                        ${item.why}
                    </div>
                `;
                container.appendChild(div);
            });
        }

        window.checkAnswer = function(qIdx, choiceIdx) {
            const optionsDiv = document.getElementById(`options-${qIdx}`);
            const expDiv = document.getElementById(`exp-${qIdx}`);
            const options = optionsDiv.getElementsByClassName('option');
            
            if (expDiv.style.display === "block") return; // Prevent double clicking

            if (choiceIdx === questions[qIdx].correct) {
                options[choiceIdx].classList.add('correct');
                currentScore++;
            } else {
                options[choiceIdx].classList.add('incorrect');
                options[questions[qIdx].correct].classList.add('correct');
            }
            
            expDiv.style.display = "block";
            updateScore();
        };

        function updateScore() {
            document.getElementById('results').innerText = `Current Score: ${currentScore} / ${questions.length}`;
        }

        renderQuiz();
    </script>
</body>
</html>
